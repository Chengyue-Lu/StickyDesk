<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StickyDesk</title>
    <style>
      html,
      body {
        margin: 0;
        background: transparent;
      }

      body {
        overflow: hidden;
        font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      }

      #boot-shell {
        position: fixed;
        inset: 0;
        padding: 12px 10px 8px;
        display: grid;
        align-content: stretch;
        background:
          radial-gradient(circle at 18% 14%, rgba(186, 230, 253, 0.18), transparent 28%),
          radial-gradient(circle at 82% 20%, rgba(255, 255, 255, 0.16), transparent 24%),
          linear-gradient(155deg, rgba(255, 255, 255, 0.14), rgba(226, 232, 240, 0.08));
        transition:
          opacity 180ms ease,
          visibility 180ms ease;
        opacity: 1;
        visibility: visible;
      }

      #boot-shell[data-hidden='true'] {
        opacity: 0;
        visibility: hidden;
      }

      .boot-shell-frame {
        height: 100%;
        border-radius: 20px;
        border: 1px solid rgba(255, 255, 255, 0.26);
        background: rgba(255, 255, 255, 0.12);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.18),
          0 12px 24px rgba(15, 23, 42, 0.08);
        display: grid;
        grid-template-rows: auto auto 1fr auto;
        gap: 8px;
        padding: 36px 10px 8px;
      }

      .boot-shell-block {
        border-radius: 12px;
        border: 1px solid rgba(191, 219, 254, 0.4);
        background: rgba(255, 255, 255, 0.42);
      }

      .boot-shell-block-top {
        min-height: 84px;
      }

      .boot-shell-block-search {
        min-height: 34px;
        border-radius: 999px;
      }

      .boot-shell-stack {
        display: grid;
        gap: 8px;
      }

      .boot-shell-block-list {
        min-height: 92px;
      }

      .boot-shell-block-footer {
        justify-self: center;
        width: 168px;
        min-height: 36px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.24);
      }
    </style>
  </head>
  <body>
    <div id="boot-shell" aria-hidden="true">
      <div class="boot-shell-frame">
        <div class="boot-shell-block boot-shell-block-top"></div>
        <div class="boot-shell-block boot-shell-block-search"></div>
        <div class="boot-shell-stack">
          <div class="boot-shell-block boot-shell-block-list"></div>
          <div class="boot-shell-block boot-shell-block-list"></div>
        </div>
        <div class="boot-shell-block boot-shell-block-footer"></div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
